<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss Raid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Lobby -->
    <div id="lobby-screen" class="screen">
        <h1 id="game-title">MIFT GOTOTHETOP</h1>
        <div class="lobby-left-actions">
            <button id="character-select-btn" class="char-select-btn">🧑 <span id="selected-char-name">캐릭터</span></button>
            <button id="shop-btn" class="char-select-btn">🛒 상점</button>
        </div>
        <button id="play-btn" class="play-btn">▶ 플레이</button>
    </div>

    <!-- Shop -->
    <div id="shop-screen" class="screen hidden">
        <h2>상점</h2>
        <div class="shop-layout">
            <div class="shop-categories">
                <button id="shop-cat-currency" class="shop-cat-btn">재화</button>
                <button id="shop-cat-iap" class="shop-cat-btn">현질</button>
                <button id="shop-cat-item" class="shop-cat-btn">아이템</button>
            </div>
            <div id="shop-content" class="shop-content"></div>
        </div>
        <button id="back-from-shop-btn" class="secondary-btn">뒤로</button>
    </div>

    <!-- Mode select (story / boss raid) -->
    <div id="mode-select-screen" class="screen hidden">
        <h2>모드 선택</h2>
        <div class="mode-list">
            <div id="story-mode-card" class="mode-card locked">
                <div class="icon">🔒</div>
                <div class="name">스토리 모드</div>
                <div class="sub">준비 중</div>
            </div>
            <div id="boss-raid-mode-card" class="mode-card">
                <div class="icon">⚔️</div>
                <div class="name">보스 레이드</div>
            </div>
        </div>
        <button id="back-from-mode-btn" class="secondary-btn">뒤로</button>
    </div>

    <!-- Character select -->
    <div id="character-select-screen" class="screen hidden">
        <h2>캐릭터 선택</h2>
        <div id="character-list" class="boss-list"></div>
        <button id="back-from-character-btn" class="secondary-btn">뒤로</button>
    </div>

    <!-- Boss select -->
    <div id="boss-select-screen" class="screen hidden">
        <h2>보스 레이드</h2>
        <div id="boss-list" class="boss-list"></div>
        <button id="back-to-lobby-btn" class="secondary-btn">뒤로</button>
    </div>

    <!-- Boss detail -->
    <div id="boss-detail-screen" class="screen hidden">
        <button id="detail-leave-btn" class="leave-party-btn hidden">나가기</button>
        <div class="detail-layout">
            <div class="detail-left">
                <div class="char-preview-row">
                    <div class="char-preview">
                        <div id="detail-char-icon" class="char-icon-circle"></div>
                        <div id="detail-char-name" class="char-name"></div>
                    </div>
                    <div id="detail-partner-preview" class="char-preview hidden">
                        <div id="detail-partner-icon" class="char-icon-circle"></div>
                        <div id="detail-partner-name" class="char-name"></div>
                    </div>
                </div>
                <button id="detail-change-char-btn" class="secondary-btn">캐릭터 변경</button>
            </div>
            <div class="detail-right">
                <h2 id="detail-boss-name">보스 이름</h2>
                <div id="detail-boss-icon" class="boss-icon-circle">🗿</div>
                <div class="detail-specs">
                    <div class="spec-row"><span class="spec-label">권장 전투력</span><span id="detail-boss-power">-</span></div>
                    <div class="spec-row"><span class="spec-label">체력</span><span id="detail-boss-hp">-</span></div>
                </div>
                <div class="detail-actions">
                    <button id="detail-multi-btn" class="play-btn">멀티플레이</button>
                    <button id="detail-solo-btn" class="play-btn">솔로플레이</button>
                </div>
            </div>
        </div>
        <button id="back-from-detail-btn" class="secondary-btn">뒤로</button>
    </div>

    <!-- Fight -->
    <div id="fight-screen" class="screen hidden">
        <button id="settings-btn" class="settings-btn">⚙</button>
        <div id="settings-menu" class="settings-menu hidden">
            <button id="leave-raid-btn" class="secondary-btn">나가기</button>
        </div>
        <div id="leave-pending-banner" class="leave-banner hidden">파트너에게 나가기 요청을 보냈습니다...</div>
        <div id="leave-request-modal" class="modal-overlay hidden">
            <div class="modal-box">
                <p>보스레이드를 나갈까요?</p>
                <div class="modal-actions">
                    <button id="leave-confirm-yes" class="play-btn">예</button>
                    <button id="leave-confirm-no" class="secondary-btn">아니요</button>
                </div>
            </div>
        </div>
        <div id="boss-hp-container" class="hp-container top">
            <div class="hp-label" id="boss-hp-label">보스</div>
            <div class="hp-bar-bg"><div id="boss-hp-bar" class="hp-bar-fill boss"></div></div>
        </div>
        <div id="my-hp-container" class="hp-container bottom-left">
            <div class="hp-label">나</div>
            <div class="cooldown-row"><span class="cooldown-label">스킬</span><span id="my-skill-cd">사용가능</span></div>
            <div class="cooldown-row"><span class="cooldown-label">궁극기</span><span id="my-ultimate-cd">사용가능</span></div>
            <div class="hp-bar-bg"><div id="my-hp-bar" class="hp-bar-fill mine"></div></div>
        </div>
        <div id="partner-hp-container" class="hp-container bottom-right hidden">
            <div class="hp-label">파트너</div>
            <div class="hp-bar-bg"><div id="partner-hp-bar" class="hp-bar-fill partner"></div></div>
        </div>
        <canvas id="gameCanvas" width="700" height="700"></canvas>
    </div>

    <!-- Result -->
    <div id="result-screen" class="screen hidden">
        <h1 id="result-title">승리!</h1>
        <p id="result-desc"></p>
        <button id="result-back-btn" class="play-btn">보스 선택으로</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="js/shared.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/boss.js"></script>
    <script src="js/player.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
